services:
  api:
    build: .
    container_name: ad-intelligence-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./chroma_db:/app/chroma_db
    env_file:
      - .env
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000

  dashboard:
    build: .
    container_name: ad-intelligence-dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./chroma_db:/app/chroma_db
    env_file:
      - .env
    command: streamlit run app/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - api